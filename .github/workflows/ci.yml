name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt pip-audit
      - name: Compile Python
        run: python -m compileall -q backend data tools tests
      - name: Check JavaScript syntax
        shell: bash
        run: find frontend/static/js -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke published database
        run: python -m tools.smoke_app --db data/football_quiz_v2.db
      - name: Audit runtime dependencies
        run: python -m pip_audit -r backend/requirements.txt
