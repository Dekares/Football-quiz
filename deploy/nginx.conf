# Tek domain'i statik + API + realtime'a yönlendiren reverse proxy.
# Statikleri doğrudan diskten/CDN'den, /api/* trafiğini api replica'larına,
# /socket.io/* trafiğini realtime node(lar)ına (sticky) yönlendirir.

upstream api {
    least_conn;
    server api-1:8000;
    server api-2:8000;        # replica ekledikçe büyüt
}

upstream realtime {
    ip_hash;                  # socket.io polling fallback için sticky
    server realtime-1:8001;
    # Çok-node: lobi koduna göre hash routing burada kurgulanır (README).
}

server {
    listen 80;

    # Statikler (alternatif: tamamen CDN'e ver)
    location /static/ {
        alias /srv/frontend/static/;
        expires 7d;
        access_log off;
    }

    location = / {
        root /srv/frontend/static;
        try_files /index.html =404;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io/ {
        proxy_pass http://realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}
